name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Force actions to run with Node.js 24
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        run: |
          echo "Forcing GitHub JavaScript actions to Node.js 24"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (if available)
        run: |
          if npm run -s | findstr /I "lint" >nul; then npm run lint; else echo "No lint script"; fi

      - name: Build
        run: npm run build --if-present

      - name: Upload build artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist
          if-no-files-found: warn

